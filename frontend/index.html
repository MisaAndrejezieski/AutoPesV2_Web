<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoPes V2 - Controle</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span class="icon">⚡</span>
                <h1>AutoPes <span class="version">V2</span></h1>
            </div>
            <div class="divider"></div>
        </header>

        <div class="card">
            <div class="card__header cyan">[ CONFIGURAÇÕES ]</div>
            <div class="card__body">
                <div class="form-group">
                    <label>📊 TEMAS:</label>
                    <input type="number" id="temas" value="2" min="1" max="10">
                </div>
                <div class="form-group">
                    <label>❓ PERGUNTAS POR TEMA:</label>
                    <input type="number" id="perguntas" value="2" min="1" max="6">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card__header purple">[ STATUS ]</div>
            <div class="card__body">
                <div class="status-area">
                    <div class="led" id="led"></div>
                    <span id="statusText">Pronto</span>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card__header pink">[ CONTROLES ]</div>
            <div class="card__body">
                <div class="button-group">
                    <button id="btnIniciar" class="btn btn-success">▶ INICIAR</button>
                    <button id="btnParar" class="btn btn-danger" disabled>⏹ PARAR</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card__header cyan">[ LOG ]</div>
            <div class="card__body">
                <div class="log-container" id="logContainer">
                    <div id="log"></div>
                </div>
            </div>
        </div>

        <footer>
            <div class="divider"></div>
            <div class="credits">
                produzido por <strong class="neon-green">Misa</strong> | v2.0
            </div>
        </footer>
    </div>

    <script src="src/js/script.js"></script>
</body>
</html>
